services:
  app:
    image: tonermanager:latest
    restart: unless-stopped
    environment:
      PORT: 3000
      AAD_TENANT_ID: ${AAD_TENANT_ID}
      AAD_CLIENT_ID: ${AAD_CLIENT_ID}
      AAD_CLIENT_SECRET: ${AAD_CLIENT_SECRET}
      AAD_REDIRECT_URI: ${AAD_REDIRECT_URI}
      LOCAL_AUTH_SECRET: ${LOCAL_AUTH_SECRET}
    volumes:
      - ./data:/app/data
    expose:
      - "3000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      EMAIL: ${EMAIL}
      ENABLE_HTTPS: ${ENABLE_HTTPS}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
